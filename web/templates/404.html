<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Halaman Tidak Ditemukan · Truth of Auditor</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;color:#E9E4D6;
    background:#0A0F1E radial-gradient(1100px 520px at 78% -10%,rgba(37,99,235,.16),transparent 60%);
    font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .card{max-width:440px;margin:24px;padding:40px 36px;background:rgba(233,228,214,.045);
    border:1px solid rgba(233,228,214,.13);border-radius:12px;text-align:center}
  .brand{font-family:Georgia,serif;font-weight:700;font-size:15px;letter-spacing:.02em;color:#A7B4CE;margin:0 0 22px}
  .brand b{color:#E9E4D6}
  .code{font-family:Georgia,serif;font-size:56px;line-height:1;margin:0 0 12px;
    background:linear-gradient(100deg,#2563eb,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:20px;margin:0 0 10px;font-family:Georgia,serif;letter-spacing:-.01em}
  p{margin:0 0 26px;font-size:14.5px;line-height:1.7;color:#96A0B5}
  a.btn{display:inline-block;padding:12px 24px;border-radius:8px;background:#2563eb;color:#fff;
    font-weight:600;font-size:14.5px;text-decoration:none}
  a.btn:hover{filter:brightness(1.1)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Truth of <b>Auditor</b></div>
  <div class="code">404</div>
  <h1>Halaman tidak ditemukan</h1>
  <p>Alamat yang kamu tuju tidak ada — mungkin sudah dipindahkan,
     dihapus, atau salah ketik.</p>
  <a class="btn" href="/">Ke Dashboard &rarr;</a>
</div>
</body>
</html>
