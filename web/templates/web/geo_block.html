<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Akses Ditolak · Truth of Auditor</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
    background:radial-gradient(120% 120% at 50% -10%,#1c140f 0%,#12100C 55%,#0b0906 100%);
    color:#E9E4D6;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;width:100%;text-align:center}
  .seal{width:54px;height:54px;margin:0 auto 26px;border-radius:50%;
    border:1.5px solid rgba(208,106,92,.55);display:grid;place-items:center;color:#D06A5C}
  .seal svg{width:24px;height:24px;display:block}
  .eyebrow{margin:0 0 18px;font-size:12px;letter-spacing:.34em;text-transform:uppercase;
    color:#D06A5C;font-weight:600}
  h1{margin:0 0 20px;font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:clamp(38px,11vw,68px);line-height:1.02;letter-spacing:-.03em;color:#F3EFE3;
    text-wrap:balance}
  p{margin:0 auto;max-width:380px;font-size:15px;line-height:1.75;color:#A39D8C;
    text-wrap:balance}
  .line{width:44px;height:2px;margin:28px auto 0;background:rgba(208,106,92,.5);border-radius:2px}
  .code{margin-top:22px;font-size:12px;letter-spacing:.18em;color:#6f6a5d;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap">
  <div class="seal" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="10.5" width="16" height="10" rx="2"></rect>
      <path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"></path>
      <circle cx="12" cy="15.5" r="1.2" fill="currentColor" stroke="none"></circle>
    </svg>
  </div>
  <p class="eyebrow">Truth of Auditor</p>
  <h1>Trust No One</h1>
  <p>Akses ditolak untuk wilayah Anda. Sistem ini hanya dapat diakses dari
     lokasi yang diizinkan. Bila Anda merasa ini keliru, hubungi administrator.</p>
  <div class="line"></div>
  <div class="code">Galat 403 &middot; Akses Terkunci</div>
</div>
</body>
</html>
