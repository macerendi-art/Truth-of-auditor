<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sesi Kedaluwarsa · Truth of Auditor</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#12100C;color:#E9E4D6;
    font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .card{max-width:420px;padding:38px 34px;background:rgba(233,228,214,.05);
    border:1px solid rgba(233,228,214,.14);border-radius:8px;text-align:center}
  h1{font-size:22px;margin:0 0 10px;font-family:Georgia,serif;letter-spacing:-.02em}
  p{margin:0 0 24px;font-size:14.5px;line-height:1.7;color:#A39D8C}
  a.btn{display:inline-block;padding:12px 22px;border-radius:6px;background:#3FA478;color:#0d0b08;
    font-weight:600;font-size:14.5px;text-decoration:none}
  a.btn:hover{filter:brightness(1.08)}
</style>
</head>
<body>
<div class="card">
  <h1>Halaman ini sudah kedaluwarsa</h1>
  <p>Demi keamanan, permintaan dari halaman yang terlalu lama terbuka tidak diproses.
     Muat ulang halaman sebelumnya, atau masuk kembali untuk melanjutkan.</p>
  <a class="btn" href="{% url 'login' %}">Ke halaman masuk &rarr;</a>
</div>
